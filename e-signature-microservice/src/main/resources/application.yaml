spring:
  application:
    name: e-signature-microservice
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
  config:
    import: "optional:configserver:http://localhost:8888"


resilience4j:
  circuitbreaker:
    instances:
      signatureProviderCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
        #Errores de cliente (4xx) no se consideran fallos para el circuito, pero se registran como excepciones ignoradas
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException.BadRequest
          - java.lang.IllegalArgumentException
          - org.springframework.web.client.HttpClientErrorException.NotFound
          - org.springframework.web.client.HttpClientErrorException.Conflict
        #Errores de servidor (5xx) y otros errores relacionados con la red se consideran fallos para el circuito y se registran como excepciones de registro
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.apache.hc.core5.http.ConnectionRequestTimeoutException
          - java.io.IOException
      contractsServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
        #Errores de cliente (4xx) no se consideran fallos para el circuito, pero se registran como excepciones ignoradas
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException.BadRequest
          - java.lang.IllegalArgumentException
          - org.springframework.web.client.HttpClientErrorException.NotFound
          - org.springframework.web.client.HttpClientErrorException.Conflict
        #Errores de servidor (5xx) y otros errores relacionados con la red se consideran fallos para el circuito y se registran como excepciones de registro
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.apache.hc.core5.http.ConnectionRequestTimeoutException
          - java.io.IOException
  retry:
    instances:
      contractsServiceRetry:
        maxAttempts: 3
        waitDuration: 2000
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.apache.hc.core5.http.ConnectionRequestTimeoutException
          - java.io.IOException
        ignore-exceptions:
          #En el caso de retry, si es un error de cliente (4xx) no se reintentará, pero se registrará como excepción ignorada, debido a que generalmente estos errores no se resuelven con reintentos y podrían indicar un problema en la solicitud del cliente.
          - org.springframework.web.client.HttpClientErrorException.BadRequest
          - java.lang.IllegalArgumentException
          - org.springframework.web.client.HttpClientErrorException.NotFound
          - org.springframework.web.client.HttpClientErrorException.Conflict
          - java.lang.IllegalArgumentException
      signatureDeleteRetry:
        maxAttempts: 3
        waitDuration: 2000
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.apache.hc.core5.http.ConnectionRequestTimeoutException
          - java.io.IOException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException.BadRequest
          - java.lang.IllegalArgumentException
          - org.springframework.web.client.HttpClientErrorException.NotFound
          - org.springframework.web.client.HttpClientErrorException.Conflict