services:
  contracts-postgres:
    image: postgres:16-alpine
    container_name: contracts-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contracts_db
    ports:
      - "5433:5432"
    volumes:
      - contracts_data:/var/lib/postgresql/data
      - ../contracts-microservice/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  auth-service-postgres:
    image: postgres:16-alpine
    container_name: auth-service-postgres
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5435:5432"
    volumes:
      - auth-data:/var/lib/postgresql/data
      - ../auth-service/db/data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  accountability-postgres:
    image: postgres:16-alpine
    container_name: accountability-postgres
    environment:
      POSTGRES_DB: accountability_db
      POSTGRES_USER: accountability_user
      POSTGRES_PASSWORD: accountability_pass
    ports:
      - "5432:5432"
    volumes:
      - accountability_data:/var/lib/postgresql/data
      - ../accountability-microservice/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accountability_user -d accountability_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
      image: mongo:7
      container_name: signature-db-mongodb
      environment:
        MONGO_INITDB_ROOT_USERNAME: root
        MONGO_INITDB_ROOT_PASSWORD: root
        MONGO_INITDB_DATABASE: signature_db
      ports:
        - "27017:27017"
      volumes:
        - mongo_data:/data/db

  kafka:
      image: apache/kafka:3.7.0
      container_name: kafka
      ports:
        - "9092:9092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
        KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
        KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      volumes:
        - kafka_data:/var/lib/kafka/data


  kafka-ui:
      image: provectuslabs/kafka-ui:latest
      container_name: kafka-ui
      ports:
        - "6048:8080"
      environment:
        KAFKA_CLUSTERS_0_NAME: local
        KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      depends_on:
        - kafka

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4318:4318" # OTLP HTTP (el que tu app está usando)
      - "4317:4317" # OTLP gRPC (opcional)
    restart: unless-stopped

volumes:
  mongo_data:
  kafka_data:
  accountability_data:
  auth-data:
  contracts_data: