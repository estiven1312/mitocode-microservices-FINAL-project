spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5435/authdb
    username: authuser
    password: authpass
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never