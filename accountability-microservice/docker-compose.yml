services:
  postgres:
    image: postgres:16-alpine
    container_name: accountability-postgres
    environment:
      POSTGRES_DB: accountability_db
      POSTGRES_USER: accountability_user
      POSTGRES_PASSWORD: accountability_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accountability_user -d accountability_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

